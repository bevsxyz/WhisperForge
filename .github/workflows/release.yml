name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: whisperforge-linux-x86_64.tar.gz
            exe_suffix: ""

          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: whisperforge-macos-arm64.tar.gz
            exe_suffix: ""

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: whisperforge-windows-x86_64.zip
            exe_suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows: disable gpu feature due to wgpu/windows crate version conflict (0.61.3 vs 0.62.2)
            cargo build --release --locked --target ${{ matrix.target }} -p whisperforge-cli --no-default-features
          else
            # Linux/macOS: enable gpu feature
            cargo build --release --locked --target ${{ matrix.target }} -p whisperforge-cli --features gpu
          fi
        shell: bash

      - name: Strip binaries (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          strip target/${{ matrix.target }}/release/whisperforge
          strip target/${{ matrix.target }}/release/wf

      - name: Package (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          tar czf ${{ matrix.asset_name }} \
            -C target/${{ matrix.target }}/release \
            whisperforge wf

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/whisperforge.exe", `
                  "target/${{ matrix.target }}/release/wf.exe" `
            -DestinationPath "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WhisperForge ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: artifacts/*
          fail_on_unmatched_files: true
