name: Release

on:
  push:
    tags:
      # Bare workspace tag (e.g. v0.4.0). Push manually after `cargo release`
      # until cargo-release is configured to emit one.
      - "v*"
      # Per-crate tag the cargo-release `whisperforge-v*` scheme emits for the
      # binary crate. Match this so a future `cargo release` triggers the
      # binary build without needing a separate `v*` push.
      - "whisperforge-v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: whisperforge-linux-x86_64.tar.gz
            exe_suffix: ""

          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: whisperforge-macos-arm64.tar.gz
            exe_suffix: ""

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: whisperforge-windows-x86_64.zip
            exe_suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p whisperforge --features gpu
        shell: bash

      - name: Strip binary (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          strip target/${{ matrix.target }}/release/wforge

      - name: Create wf alias shim (Linux / macOS)
        if: matrix.os != 'windows-latest'
        # `wforge` is the canonical binary; `wf` is a tiny shell shim for
        # users who prefer the short name. Bundled in the release tarball.
        run: |
          cat > target/${{ matrix.target }}/release/wf <<'EOF'
          #!/bin/sh
          exec "$(dirname "$0")/wforge" "$@"
          EOF
          chmod +x target/${{ matrix.target }}/release/wf

      - name: Package (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          tar czf ${{ matrix.asset_name }} \
            -C target/${{ matrix.target }}/release \
            wforge wf

      - name: Create wf alias shim (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        # `wforge` is the canonical binary; `wf` is a batch shim for users who
        # prefer the short name (avoids the Windows Firewall `wf` collision by
        # making the explicit name the default).
        run: |
          Set-Content -Path "target/${{ matrix.target }}/release/wf.cmd" `
            -Value '@"%~dp0wforge.exe" %*' -Encoding ascii

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/wforge.exe","target/${{ matrix.target }}/release/wf.cmd" `
            -DestinationPath "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Extract release notes
        run: awk '/^## \[/{if(found){exit} found=1} found{print}' CHANGELOG.md > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WhisperForge ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          files: artifacts/*
          fail_on_unmatched_files: true
