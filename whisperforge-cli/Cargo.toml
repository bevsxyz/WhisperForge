[package]
name = "whisperforge-cli"
version = "0.1.0"
edition = "2021"
license = "MIT"

[[bin]]
name = "whisperforge"
path = "src/main.rs"

[dependencies]
whisperforge-core = { path = "../whisperforge-core" }
whisperforge-align = { path = "../whisperforge-align" }
clap = { workspace = true, features = ["derive"] }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokenizers = "0.19"
burn = { workspace = true, features = ["std", "ndarray", "wgpu"] }
burn-ndarray = { workspace = true }
