[package]
name = "whisperforge-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "GPU-accelerated Whisper transcription CLI (WGPU/CPU, speaker diarization)"
keywords = ["whisperforge", "whisper", "speech-to-text", "wgpu", "cli"]
categories = ["command-line-utilities", "multimedia::audio"]

[[bin]]
name = "whisperforge"
path = "src/main.rs"

[[bin]]
name = "wf"
path = "src/main.rs"

[dependencies]
whisperforge-core = { path = "../whisperforge-core", version = "0.2.0" }
whisperforge-align = { path = "../whisperforge-align", version = "0.2.0" }
whisperforge-diarize = { path = "../whisperforge-diarize", version = "0.2.0" }
clap = { workspace = true, features = ["derive"] }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokenizers = "0.19"
burn = { workspace = true, features = ["std", "ndarray", "wgpu"] }
burn-ndarray = { workspace = true }
