allow-branch = ["main"]
push = true
publish = false
sign-commit = false
sign-tag = false
pre-release-hook = ["bash", "-c", "eval \"$(mise activate bash)\" && git-cliff --tag v{{version}} --output CHANGELOG.md && WS=$(git rev-parse --show-toplevel) && git-cliff --tag v{{version}} --workdir \"$WS\" --output \"$WS/CHANGELOG.md\" || true"]
pre-release-commit-message = "chore: release v{{version}}"
tag-message = "Release v{{version}}"
