[tools]
python = "latest"
uv = "latest"

[tasks.pre-commit]
description = "Pre-commit checks: fmt"
run = """
#!/bin/sh
set -e
cargo fmt --all -- --check
if command -v typos >/dev/null 2>&1; then typos; fi
"""

[tasks.pre-push]
description = "Pre-push checks: compile"
run = "cargo check --all"

[tasks.setup]
description = "Install git hooks into .git/hooks/ — run once after cloning"
run = """
#!/bin/sh
set -e
HOOKS_SRC="$(git rev-parse --show-toplevel)/scripts/hooks"
HOOKS_DST="$(git rev-parse --git-dir)/hooks"
for hook in "$HOOKS_SRC"/*; do
    name="$(basename "$hook")"
    cp "$hook" "$HOOKS_DST/$name"
    chmod +x "$HOOKS_DST/$name"
    echo "installed $name"
done
echo "done"
"""
